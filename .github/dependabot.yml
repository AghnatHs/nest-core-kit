version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    # Group related updates to reduce PR spam
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"

      dev-dependencies:
        dependency-type: "development"

      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

    # Control version update behavior
    versioning-strategy: increase

    # Ignore risky updates by handle manually
    ignore:
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]

      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

    # Auto-assign reviewers (optional but useful)
    reviewers:
      - "AghnatHs"

    # Add labels for workflow automation
    labels:
      - "dependencies"
      - "dependabot"
